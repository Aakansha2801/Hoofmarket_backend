# ============================================================
# HoofMarketIQ — docker-compose.yml
#
# Architecture: scrapers → Bubble.io (no intermediate DB)
#
# Usage (docker-compose v1 or docker compose v2):
#   docker-compose up -d              → start scheduler (production)
#   docker-compose run --rm scraper python main.py --once  → single run
#   docker-compose logs -f            → follow logs
#   docker build -t aakansha28/hoofmarket-scraper:v3 .  → rebuild
#   docker push aakansha28/hoofmarket-scraper:v3         → push to Hub
# ============================================================

services:
  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    image: aakansha28/hoofmarket-scraper:v3
    container_name: hoofmarket_scraper
    restart: unless-stopped

    env_file:
      - .env                          # API_TOKEN for Bubble.io

    environment:
      TESTING_MODE: "false"           # 24h schedule in production
      PYTHONUNBUFFERED: "1"
      TZ: "America/Chicago"           # Texas time for scheduler

    volumes:
      - ./logs:/app/logs              # persist logs outside container

    ports:
      - "8010:8010"

    # Resource limits — scraper is I/O bound, not CPU heavy
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
