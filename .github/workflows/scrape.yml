name: HoofMarketIQ Scrape

on:
  schedule:
    - cron: '10 8 * * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Which scraper to run (all | wildlifebuyer | bucktrader)'
        required: false
        default: 'all'

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 60

    env:
      SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      TESTING_MODE:         "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run scrape + analytics
        run: |
          source venv/bin/activate
          python3 main.py --once

      - name: Upload log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hoofmarket-log-${{ github.run_id }}
          path: hoofmarket.log
          retention-days: 7